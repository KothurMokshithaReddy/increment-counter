<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Counter </title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
}

.card{
width:380px;
padding:35px;
border-radius:25px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
text-align:center;
color:white;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

h1{
margin-bottom:20px;
}

.counter{
font-size:80px;
font-weight:bold;
margin:20px 0;
color:#38bdf8;
}

.btn-group{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

.plus{
background:#22c55e;
color:white;
}

.minus{
background:#f97316;
color:white;
}

.reset{
background:#ef4444;
color:white;
}

button:hover{
transform:scale(1.05);
}

.message{
margin-top:20px;
font-weight:bold;
color:#facc15;
}
</style>
</head>
<body>

<div class="card">
<h1> Increment Counter</h1>

<div class="counter" id="counter">0</div>

<div class="btn-group">
<button class="plus" onclick="increase()">+1</button>
<button class="minus" onclick="decrease()">-1</button>
<button class="reset" onclick="resetCount()">Reset</button>
</div>

<div class="message" id="message"></div>
</div>

<script>
let count = 0;

function updateDisplay(){
document.getElementById("counter").innerText = count;

if(count === 10){
document.getElementById("message").innerText =
"🎉 Milestone Reached: 10!";
}
else if(count === 20){
document.getElementById("message").innerText =
"🚀 Amazing! Reached 20!";
}
else{
document.getElementById("message").innerText = "";
}
}

function increase(){
count++;
updateDisplay();
}

function decrease(){
count--;
updateDisplay();
}

function resetCount(){
count = 0;
updateDisplay();
}
</script>

</body>
</html>
